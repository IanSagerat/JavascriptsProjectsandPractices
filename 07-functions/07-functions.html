    function greet(name){
        if(!name){
            return 'Hi there!';
        }else if(name){
        return `Hello ${name}!`;
        }
    }
    console.log(greet('Ian Gwapo'));
    function convertToFahrenheit(celsius){
        const converter = (celsius * 9 / 5) + 32;
        return converter;
    }
    console.log(convertToFahrenheit(25));

    function convertToCelsius(fahrenheit){
        const converter = (fahrenheit - 32 ) * 5 / 9;
        return converter;
    }
    console.log(convertToCelsius(86));

    function convertTemperatures(degree, unit){
        if(unit === 'C'){
            const converter = (degree * 9 / 5) + 32;
            return `${converter}C`;
        }else if(unit === 'F'){
            const converter = (degree - 32) * 5 / 9;
            return `${converter}F`;
        }else{
            return 'Not eligible unit';
        }
    }
    console.log(convertTemperatures(25,'C'));
    console.log(convertTemperatures(86,'F'));

    function convertLength(length, from, to){
    const validUnits = ['km', 'miles', 'ft'];
        if(!validUnits.includes(from)){
            return `Invalid unit: ${from}`;
        }
        if(!validUnits.includes(to)){
            return `Invalid unit: ${to}`
        }
    if(from === 'km'){
        if(to === 'ft'){
            return `${length * 3281} ft`;
        }else if(to === 'miles'){
            return `${length / 1.6} miles`;
        }else{
            return `${length} km`;
        }
    }else if(from === 'miles'){
        if(to === 'ft'){
            return `${length * 5280} ft`;
        }else if(to === 'km'){
            return `${length * 1.6} km`;
        }else{
            return `${length} miles`;
        }
    }else if(from === 'ft'){
        if(to === 'km'){
            return `${length / 3281} km`;
        }else if(to === 'miles'){
            return `${length / 5280} miles`;
        }else{
            return `${length} ft`;
        }
    }
}
    console.log(convertLength(5, 'miles', 'km'));
    console.log(convertLength(5, 'miles', 'ft'));
    console.log(convertLength(5, 'lbs', 'lbs'));
