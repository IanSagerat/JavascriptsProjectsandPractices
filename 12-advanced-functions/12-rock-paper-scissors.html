<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12 Rock Paper Scissors</title>
    <style>
        body {
            background-color: rgb(25,25,25);
            color: white;
            font-family: Arial, Helvetica, sans-serif   ;
        }

        .title{
            font-size: 30px;
            font-weight: bold;
        }

        .move-icon{
            height: 50px;
        }
        .move-button{
            background-color: transparent;
            border: 3px solid white;
            width: 100px;
            height: 100px;
            border-radius: 50px;
            margin-right: 10px;
            cursor: pointer;
        }
        .score-result{
            font-size: 20px;
            font-weight: bold;
        }
        .score-reset, .auto{
            font-size: 15px;
            padding: 10px 15px;
        }
    </style>
</head>
<body>
    <p class="title">Rock Paper Scissors</p>
    <button class="move-button rock-button"><img src="../images/rock-emoji.png" alt="" class="move-icon"></button>

    <button class="move-button paper-button"><img src="../images/paper-emoji.png" alt="" class="move-icon"></button>

    <button class="move-button scissor-button"><img src="../images/scissors-emoji.png" alt="" class="move-icon"></button>
    
    <p class="playerPick move-icon" style="margin-top: 30px;"></p>
    <p class="computerMove move-icon"></p>
    <p class="js-result score-result"></p>
    <p class="js-score"></p>

    <button class="score-reset" onclick="resetScore()">Reset Score</button>
    <button class="auto" onclick="autoPlay()">Play</button>
    <script>
        const message = false && 'Hello';
        console.log(message);

        const messages = false || 'Hello';
        console.log(messages);

        function pickComputerMove(){
            const randomNumber = Math.random();

            let computerMove = '';

            if(randomNumber >= 0 && randomNumber < 1/3) computerMove = 'rock';
            else if(randomNumber >= 1/3 && randomNumber < 2/3) computerMove = 'paper';
            else if(randomNumber >= 2/3 && randomNumber < 1) computerMove = 'scissors';
            return computerMove;
        }

        const score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            tie: 0
        };
        
        let isAutoPlaying = false;
        let intervalId;
        const playButton = document.querySelector('.auto');

        function autoPlay(){
            if(!isAutoPlaying){
                playButton.innerHTML = 'Stop';
                intervalId = setInterval(() => {
                    const playerMove = pickComputerMove();
                    playGame(playerMove);
                }, 1000);
                isAutoPlaying = true;
            } else {
                playButton.innerHTML = 'Play';
                clearInterval(intervalId);
                isAutoPlaying = false;
            }
        }

        document.addEventListener('keydown', pressedKey)
        function pressedKey(event){
            if(event.key === 'a' || event.key === 'A') autoPlay()
        }

            document.body.addEventListener('keydown', (event) => {
            if(event.key === 'r' || event.key === 'R') playGame('rock')
            else if(event.key === 'p' || event.key === 'P') playGame('paper')
            else if(event.key === 's' || event.key === 'S') playGame('scissors')
        });
        document.querySelector('.rock-button').addEventListener('click', () => {
            playGame('rock');
        });
        document.querySelector('.paper-button').addEventListener('click', () => {
            playGame('paper');
        });
        document.querySelector('.scissor-button').addEventListener('click', () => {
            playGame('scissors');
        });
        function playGame(playerMove){
            const computerMove = pickComputerMove();

                let result = '';
            if(playerMove === 'rock'){
                if(computerMove === 'rock') result = "It's a Tie";
                else if(computerMove === 'paper') result = 'You lose';
                else if(computerMove === 'scissors') result = 'You win';
            }else if(playerMove === 'paper'){
                if(computerMove === 'paper') result = "It's a Tie";
                else if(computerMove === 'scissors') result = 'You lose';
                else if(computerMove === 'rock') result = 'You win';
            }else if(playerMove === 'scissors'){
                if(computerMove === 'rock') result = 'You lose';
                else if(computerMove === 'paper') result = 'You win';
                else if(computerMove === 'scissors') result = "It's a Tie";
            }
            
            if(result === 'You win') score.wins++; 
            else if(result === 'You lose') score.losses++;
            else score.tie++;

            localStorage.setItem('score', JSON.stringify(score));
            displayScore();
            displayResult(result);
            displayMove(playerMove, computerMove);
        }

        function displayScore(){
            document.querySelector('.js-score').innerHTML = 
            `Wins: ${score.wins} Losses: ${score.losses} Ties: ${score.tie}`;
        }

        function displayMove(playerMove = 'reset', computerMove= 'reset'){
            document.querySelector('.playerPick').innerHTML = 
            `🧍 You picked - <img src="../images/${playerMove}-emoji.png" class="move-icon">`;

            document.querySelector('.computerMove').innerHTML = 
            `🤖 Computer picked - <img src="../images/${computerMove}-emoji.png" class="move-icon">`;
        }

        function displayResult(result='') {
            document.querySelector('.js-result').innerHTML = 
            `Result: ${result}`;
        }
        function resetScore(){
            score.wins = 0;
            score.losses = 0;
            score.tie = 0;
            
            localStorage.setItem('score', JSON.stringify(score));
            displayScore();
            displayMove(playerMove= 'reset', computerMove= 'reset');
            displayResult();
        }

        displayScore();
        displayMove();
        displayResult();

        function reverseArray(arr){
            let left = 0;
            let right = arr.length - 1;

            while ( left < right ){
                [arr[left], arr[right]] = [arr[right], arr[left]];
                left++;
                right--;
            }
            return arr;
        }
        console.log(reverseArray([1,2,3,4,5,6]));
    </script>
</body>
</html>
