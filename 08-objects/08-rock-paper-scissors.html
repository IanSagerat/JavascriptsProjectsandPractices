<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
    playGame('rock');
    ">Rock</button>

    <button onclick="
    playGame('paper');
    ">Paper</button>

    <button onclick="
    playGame('scissors');
    ">Scissors</button>

    <p class="js-score"></p>
    
    <p class="playerPick"></p>
    <p class="computerMove"></p>
    <p class="js-result"></p>

    <button onclick="resetScore()">Reset Score</button>
    <script>
        const message = false && 'Hello';
        console.log(message);

        const messages = false || 'Hello';
        console.log(messages);

        function pickComputerMove(){
            const randomNumber = Math.random();

            let computerMove = '';

            if(randomNumber >= 0 && randomNumber < 1/3) computerMove = 'rock';
            else if(randomNumber >= 1/3 && randomNumber < 2/3) computerMove = 'paper';
            else if(randomNumber >= 2/3 && randomNumber < 1) computerMove = 'scissors';
            return computerMove;
        }

        const score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            tie: 0
        };
        
        function playGame(playerMove){
            const computerMove = pickComputerMove();

                let result = '';
            if(playerMove === 'rock'){
                if(computerMove === 'rock') result = "It's a Tie";
                else if(computerMove === 'paper') result = 'You lose';
                else if(computerMove === 'scissors') result = 'You win';
            }else if(playerMove === 'paper'){
                if(computerMove === 'paper') result = "It's a Tie";
                else if(computerMove === 'scissors') result = 'You lose';
                else if(computerMove === 'rock') result = 'You win';
            }else if(playerMove === 'scissors'){
                if(computerMove === 'rock') result = 'You lose';
                else if(computerMove === 'paper') result = 'You win';
                else if(computerMove === 'scissors') result = "It's a Tie";
            }
            
            if(result === 'You win') score.wins++; 
            else if(result === 'You lose') score.losses++;
            else score.tie++;

            localStorage.setItem('score', JSON.stringify(score));
            displayScore();
            displayResult(result);
            displayMove(playerMove, computerMove);
        }

        function displayScore(){
            document.querySelector('.js-score').innerHTML = 
            `Wins: ${score.wins} Losses: ${score.losses} Ties: ${score.tie}`;
        }

        function displayMove(playerMove = '?', computerMove= '?'){
            document.querySelector('.playerPick').innerHTML = 
            `🧍 You picked - ${playerMove}`;

            document.querySelector('.computerMove').innerHTML = 
            `🤖 Computer picked - ${computerMove}`;
        }

        function displayResult(result='') {
            document.querySelector('.js-result').innerHTML = 
            `Result: ${result}`;
        }
        function resetScore(){
            score.wins = 0;
            score.losses = 0;
            score.tie = 0;
            
            localStorage.setItem('score', JSON.stringify(score));
            displayScore();
            displayMove(playerMove= '?', computerMove= '?');
            displayResult();
        }

        displayScore();
        displayMove();
        displayResult();

        const user = {
            name: 'Ian',
            age: 24
        };

        const keys = Object.keys(user);

        console.log(keys);
    </script>
</body>
</html>
